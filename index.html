<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机抽人</title>
    <style>
        #result {
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>随机抽人（名单保密）</h1>
    <button onclick="draw()">抽人</button>
    <p id="result">等待抽选...</p>

    <script>
        var participants = ['', '', '', '']; // 将名单存储在JavaScript数组中

        function draw() {
            var result = participants[Math.floor(Math.random() * participants.length)];
            document.getElementById('result').innerText = '抽中的人是：' + result;
        }

        function reset() {
            document.getElementById('result').innerText = '等待抽选...';
        }
    </script>
</body>
</html>
